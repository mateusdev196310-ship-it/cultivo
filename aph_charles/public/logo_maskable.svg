<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A5C" />
      <stop offset="100%" stop-color="#2563A8" />
    </linearGradient>
    
    <!-- Accent Orange Gradient -->
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9233" />
      <stop offset="100%" stop-color="#F47B20" />
    </linearGradient>

    <!-- White Glow Filter -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#F47B20" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Rect covering full size for maskable -->
  <rect width="512" height="512" fill="url(#bg-grad)" />

  <!-- Graduation Cap & Certificate Accent Symbol inside a Stylized CA (Scaled and Centered for Safe Area) -->
  <g transform="translate(96, 96) scale(0.625)" filter="url(#glow)">
    <!-- Stylized "C" in Orange -->
    <path d="M 160 80 
             C 90 80, 50 130, 50 192 
             C 50 254, 90 304, 160 304 
             C 210 304, 240 280, 250 250
             L 190 250
             C 180 260, 170 264, 160 264
             C 120 264, 95 230, 95 192
             C 95 154, 120 120, 160 120
             C 170 120, 180 124, 190 134
             L 250 134
             C 240 104, 210 80, 160 80 Z" 
          fill="url(#orange-grad)" />

    <!-- Stylized "A" in White -->
    <path d="M 270 304 
             L 320 100 
             L 340 100 
             L 390 304 
             L 340 304 
             L 329 250 
             L 291 250 
             L 280 304 Z 
             M 298 210 
             L 322 210 
             L 310 145 Z" 
          fill="#FFFFFF" />

    <!-- Stylized Graduation Cap Accent on top -->
    <path d="M 192 40 L 232 60 L 192 80 L 152 60 Z" fill="#FFFFFF" />
    <path d="M 232 60 L 232 90" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    <circle cx="232" cy="90" r="4" fill="url(#orange-grad)" />
  </g>
</svg>
