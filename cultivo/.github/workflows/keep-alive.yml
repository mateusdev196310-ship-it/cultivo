name: Keep Render Service Awake

on:
  schedule:
    # Executa a cada 10 minutos (Render suspende após 15 minutos de inatividade)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite executar manualmente no painel de Actions do GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          # Tenta ler de segredos ou variáveis do GitHub. Se não existir, usa a URL padrão do app no Render.
          TARGET_URL="${{ secrets.RENDER_APP_URL || vars.RENDER_APP_URL || 'https://cultiva-app.onrender.com/ping' }}"
          echo "Enviando ping para: $TARGET_URL"
          curl -i -s "$TARGET_URL"

      - name: Prevent GitHub from suspending cron
        uses: gautamkrishnar/keepalive-workflow@v1 # Mantém a Action ativa mesmo após 60 dias sem commits no repositório
